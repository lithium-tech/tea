name: GP6 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            bison \
            ccache \
            cmake \
            curl \
            flex \
            git-core \
            gcc \
            g++ \
            inetutils-ping \
            krb5-kdc \
            krb5-admin-server \
            libapr1-dev \
            libbz2-dev \
            libcurl4-gnutls-dev \
            libevent-dev \
            libkrb5-dev \
            libpam-dev \
            libperl-dev \
            libreadline-dev \
            libssl-dev \
            libxerces-c-dev \
            libxml2-dev \
            libyaml-dev \
            libzstd-dev \
            locales \
            net-tools \
            ninja-build \
            openssh-client \
            openssh-server \
            openssl \
            pkg-config \
            python3-dev \
            python3-pip \
            python3-psycopg2 \
            python3-psutil \
            python3-yaml \
            zlib1g-dev
    
      - name: Build Greenplum 6
        run: |
          git clone https://github.com/greenplum-db/gpdb-archive.git
          cd gpdb-archive
          git submodule update --init
          ./configure --with-perl --with-python --with-libxml --with-gssapi --prefix=/usr/local/gpdb
          make -j8
          make -j8 install
